<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- Main brand gradient (Indigo to Purple) -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    
    <!-- Sparkle/Accent gradient (Cyan to Pink) -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE" />
      <stop offset="50%" stop-color="#EC4899" />
      <stop offset="100%" stop-color="#F43F5E" />
    </linearGradient>

    <!-- Glassmorphic card gradient -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.02" />
    </linearGradient>
    
    <!-- Subtle drop shadow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background glowing accent -->
  <circle cx="50" cy="50" r="40" fill="url(#brandGrad)" opacity="0.15" filter="url(#glow)" />

  <!-- 1. The Resume Document Base Shape -->
  <path d="M 28 20 C 28 17, 30 15, 33 15 H 58 L 72 29 V 80 C 72 83, 70 85, 67 85 H 33 C 30 85, 28 83, 28 80 Z" fill="url(#glassGrad)" stroke="url(#brandGrad)" stroke-width="3" stroke-linejoin="round" />

  <!-- Page Fold (Top right corner detail) -->
  <path d="M 58 15 V 25 C 58 27, 60 29, 62 29 H 72" fill="none" stroke="url(#brandGrad)" stroke-width="3" stroke-linejoin="round" />

  <!-- Stylized Resume Text Lines -->
  <path d="M 38 40 H 62" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.3" />
  <path d="M 38 50 H 54" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.3" />
  <path d="M 38 60 H 48" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.3" />

  <!-- 2. Overlapping AI Sparkle (Symbolizing AI Analysis) -->
  <path d="M 64 52 C 64.5 58, 66 59.5, 72 60 C 66 60.5, 64.5 62, 64 68 C 63.5 62, 62 60.5, 56 60 C 62 59.5, 63.5 58, 64 52 Z" fill="url(#accentGrad)" filter="url(#glow)" />

  <!-- Smaller secondary spark -->
  <path d="M 44 26 C 44.3 29, 45 29.7, 48 30 C 45 30.3, 44.3 31, 44 34 C 43.7 31, 43 30.3, 40 30 C 43 29.7, 43.7 29, 44 26 Z" fill="url(#accentGrad)" opacity="0.8" />
</svg>